from bot import GeminiBot
import sys

def main():
    # Thay API Key của bạn vào đây
    API_KEY = "YOUR_API_KEY_HERE"
    
    # Khởi tạo instance của Bot
    # Sử dụng 'gemini-1.5-flash' để đảm bảo không bị lỗi 404
    bot = GeminiBot(api_key=API_KEY)

    print("=== CHÀO MỪNG BẠN ĐẾN VỚI GEMINI AI BOT ===")
    print("(Gõ 'exit' hoặc 'quit' để thoát, 'reset' để xóa lịch sử)")

    while True:
        user_input = input("\nBạn: ").strip()

        if user_input.lower() in ['exit', 'quit']:
            print("Tạm biệt!")
            break
        
        if user_input.lower() == 'reset':
            bot.reset_chat()
            print("System: Lịch sử trò chuyện đã được làm mới.")
            continue

        if not user_input:
            continue

        # Bot xử lý và trả lời
        print("Bot đang suy nghĩ...", end="\r")
        reply = bot.ask(user_input)
        print(f"Bot: {reply}")

if __name__ == "__main__":
    try:
        main()
    except KeyboardInterrupt:
        print("\nĐã dừng chương trình.")
        sys.exit(0)
