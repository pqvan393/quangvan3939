import asyncio
from bot import GeminiBot, GeminiChatBot   # Import từ bot.py

async def main():
    # Khởi tạo bot
    bot = GeminiBot()                    # Hoặc GeminiChatBot() nếu muốn có lịch sử
    # bot = GeminiChatBot()

    print("🤖 Gemini Bot đã sẵn sàng! (Nhập 'exit' hoặc 'quit' để thoát)\n")

    while True:
        user_input = input("Bạn: ").strip()

        if user_input.lower() in ['exit', 'quit', 'thoát']:
            print("👋 Tạm biệt!")
            break

        if not user_input:
            continue

        print("Đang suy nghĩ...", end="\r")

        # Dùng async (khuyến nghị)
        response = await bot.generate_response_async(user_input)

        # Hoặc dùng sync:
        # response = bot.generate_response(user_input)

        print(f"Gemini: {response}\n")


if __name__ == "__main__":
    # Cách tốt nhất: đặt API key vào biến môi trường
    # export GOOGLE_GENAI_API_KEY="your_api_key_here"

    asyncio.run(main())
