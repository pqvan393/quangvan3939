name: Run Gemini Bot

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Vượt qua cảnh báo Node của GitHub
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5 # Dùng bản v5 mới nhất
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-genai

      - name: Run bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python bot.py
